{
  "policy": {
    "version": "0.1.0",
    "statement": "ReasonWeave does not claim permanent mathematical optimality; it enforces measurable routing quality through validation, evidence gates, evals, and safe blocking.",
    "acceptance": {
      "confidence": "high",
      "grounding_risk": "low",
      "access_violations": "none"
    },
    "final_resolver": {
      "logical_agent": "critic",
      "model": "gpt-5.5",
      "reasoning_effort": "xhigh"
    },
    "max_escalations_per_strand": 2
  },
  "platform_agent_types": [
    "default",
    "explorer",
    "worker"
  ],
  "reasoning_efforts": [
    "low",
    "medium",
    "high",
    "xhigh"
  ],
  "models": [
    "gpt-5.5",
    "gpt-5.4",
    "gpt-5.4-mini",
    "gpt-5.3-codex",
    "gpt-5.2"
  ],
  "access_tiers": {
    "A1": {
      "name": "route-only",
      "allowed_tools": [
        "classify",
        "route",
        "emit-router-packet"
      ],
      "forbidden_tools": [
        "edit-files",
        "run-tests",
        "mutating-shell",
        "git-mutation",
        "deploy"
      ]
    },
    "A2": {
      "name": "read-only-local",
      "allowed_tools": [
        "read-files",
        "search-files",
        "inspect-diffs",
        "inspect-status"
      ],
      "forbidden_tools": [
        "edit-files",
        "run-tests",
        "network",
        "git-mutation"
      ]
    },
    "A3": {
      "name": "read-plus-research",
      "allowed_tools": [
        "read-files",
        "search-files",
        "inspect-diffs",
        "approved-web-docs"
      ],
      "forbidden_tools": [
        "edit-files",
        "run-tests",
        "git-mutation"
      ]
    },
    "A4": {
      "name": "write-owned-files",
      "allowed_tools": [
        "edit-owned-files",
        "focused-checks"
      ],
      "forbidden_tools": [
        "unowned-edits",
        "destructive-commands",
        "git-push",
        "git-reset"
      ]
    },
    "A5": {
      "name": "verification",
      "allowed_tools": [
        "edit-owned-files",
        "run-tests",
        "run-builds",
        "browser-checks"
      ],
      "forbidden_tools": [
        "deploy",
        "secrets",
        "destructive-commands"
      ]
    },
    "A6": {
      "name": "authorized-ops-release",
      "allowed_tools": [
        "approved-ops",
        "approved-release",
        "approved-git-mutation"
      ],
      "forbidden_tools": [
        "unapproved-production",
        "unapproved-destructive"
      ]
    },
    "A7": {
      "name": "blocked-destructive",
      "allowed_tools": [],
      "forbidden_tools": [
        "all-action-before-approval"
      ]
    }
  },
