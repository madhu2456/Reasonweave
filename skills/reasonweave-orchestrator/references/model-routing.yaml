{
  "policy": {
    "version": "0.1.0",
    "statement": "ReasonWeave does not claim permanent mathematical optimality; it enforces measurable routing quality through validation, evidence gates, evals, and safe blocking.",
    "acceptance": {
      "confidence": "high",
      "grounding_risk": "low",
      "access_violations": "none",
      "execution_status": [
        "runtime_verified",
        "receipt_verified"
      ],
      "model_match": true,
      "reasoning_match": true,
      "receipt_valid": true,
      "dispatch_authorized": true
    },
    "final_resolver": {
      "logical_agent": "critic",
      "model": "gpt-5.5",
      "reasoning_effort": "xhigh"
    },
    "terminal_route": {
      "model": "gpt-5.5",
      "reasoning_effort": "xhigh",
      "applies_to_all_logical_agents": true
    },
    "max_escalations_per_strand": 2
  },
  "platform_agent_types": [
    "default",
    "explorer",
    "worker"
  ],
  "reasoning_efforts": [
    "low",
    "medium",
    "high",
    "xhigh"
  ],
  "models": [
    "gpt-5.5",
    "gpt-5.4",
    "gpt-5.4-mini",
    "gpt-5.3-codex",
    "gpt-5.2"
  ],
  "execution_statuses": [
    "runtime_verified",
    "receipt_verified",
    "spawn_request_only",
    "blocked_unverified",
    "failed"
  ],
  "verification_sources": [
    "platform_metadata",
    "runner_receipt",
    "spawn_request",
    "none"
  ],
  "failure_states": [
    "missing_api_key",
    "invalid_api_key",
    "bad_key_permissions",
    "network_failure",
    "rate_limited",
    "invalid_request",
    "unsupported_runtime",
    "provider_refusal",
    "provider_error",
    "model_unavailable",
    "tool_spawn_failure",
    "timeout",
    "missing_runtime_metadata",
    "incomplete_response",
    "model_mismatch",
    "reasoning_mismatch",
    "missing_signing_key",
    "receipt_verification_failure",
    "unauthorized_fallback_attempt",
    "parent_child_chain_mismatch",
    "subscription_metadata_untrusted",
    "codex_config_missing",
    "codex_config_invalid",
    "route_not_authorized",
    "ledger_write_failure",
    "ledger_integrity_failure",
    "ledger_read_failure"
  ],
  "execution_surfaces": {
    "api": {
      "mode": "strict_verified",
      "runtime_verification_required": true,
      "report_execution_status": true,
      "user_facing_route_format": "Route: logical_agent=<agent>; intended_model=<model>; intended_reasoning=<effort>; execution_model=<model|none>; resolved_model=<model|none>; execution_reasoning=<effort|none>; execution_status=<runtime_verified|receipt_verified|spawn_request_only|blocked_unverified|failed>; model_match=<true|false>; reasoning_match=<true|false|unknown>; verification_source=<platform_metadata|runner_receipt|spawn_request|none>; access=<tier>"
    },
    "codex_subscription": {
      "mode": "advisory",
      "runtime_verification_required": false,
      "report_execution_status": false,
      "user_facing_route_format": "ReasonWeave: logical_agent=<agent>; intended_model=<model>; intended_reasoning=<effort>; access=<tier>; mode=codex_subscription",
      "suppressed_user_facing_fields": [
        "execution_model",
        "resolved_model",
        "execution_reasoning",
        "execution_status",
        "model_match",
        "reasoning_match",
        "verification_source"
      ],
      "forbidden_unverified_claims": [
        "verified model execution",
        "signed reviewer pass",
        "API-verified review",
        "approved",
        "no issues found"
      ]
    }
  },
  "runner_limits": {
    "tool_timeout_ms": 120000,
    "max_output_tokens": 32768,
    "max_output_text_chars": 100000,
    "require_provider_response_id": true
  },
  "model_aliases": {
    "gpt-5.5": [
      "gpt-5.5",
      "gpt-5.5-*"
    ],
    "gpt-5.4": [
      "gpt-5.4",
      "gpt-5.4-*"
    ],
    "gpt-5.4-mini": [
      "gpt-5.4-mini",
      "gpt-5.4-mini-*"
    ],
    "gpt-5.3-codex": [
      "gpt-5.3-codex",
      "gpt-5.3-codex-*"
    ],
    "gpt-5.2": [
      "gpt-5.2",
      "gpt-5.2-*"
    ]
  },
  "model_alias_rule": "Versioned suffix matches never cross into a separately allowlisted named model family; for example gpt-5.4-mini is not a valid resolved alias for gpt-5.4.",
  "runtime_receipt": {
    "receipt_version": "1",
    "hash_algorithm": "sha256",
    "hash_domain": "reasonweave-runtime-receipt:v1\n",
    "signature_algorithm": "ed25519",
    "max_lifetime_ms": 600000,
    "canonical_json": {
      "encoding": "utf-8",
      "sort_keys": true,
      "whitespace": "none",
      "timestamp_format": "normalized_iso8601"
    },
    "required_fields": [
      "receipt_version",
      "run_id",
      "nonce",
      "delegated_agent_id",
      "parent_run_id",
      "logical_agent",
      "primary_task_type",
      "risk_flags",
      "platform_agent_type",
      "access",
      "intended_model",
      "resolved_model",
      "execution_model",
      "intended_reasoning",
      "execution_reasoning",
      "verification_source",
      "model_match",
      "reasoning_match",
      "dispatch_authorized",
      "issued_at",
      "expires_at",
      "key_id",
      "receipt_hash",
      "receipt_signature"
    ],
    "hash_excluded_fields": [
      "receipt_hash",
      "receipt_signature"
    ],
    "replay_key": [
      "run_id",
      "nonce"
    ],
    "reject_if": [
      "expired",
      "replayed_run_id_nonce",
      "unknown_key_id",
      "missing_public_key",
      "invalid_hash",
      "invalid_signature",
      "invalid_receipt_lifetime",
      "receipt_lifetime_exceeded",
      "parent_child_chain_mismatch"
    ]
  },
  "completion_reporting": {
    "api": {
      "required_for_routed_work": true,
      "report_every_selected_agent": true,
      "required_fields": [
        "logical_agent",
        "intended_model",
        "intended_reasoning",
        "execution_status",
        "verification_source",
        "decision",
        "block_reason"
      ],
      "review_status_agents": [
        "reviewer",
        "docs-reviewer",
        "critic"
      ],
      "review_required_task_types": [
        "audit",
        "review",
        "implement",
        "refactor",
        "docs",
        "ui",
        "data",
        "memory-cleanup",
        "web-audit",
        "web-build"
      ],
      "blocked_review_status": "blocked_unverified",
      "forbidden_claims_without_verified_review": [
        "review passed",
        "approved",
        "no issues found"
      ]
    },
    "codex_subscription": {
      "report_intended_route": true,
      "report_execution_status": false,
      "may_proceed_advisory": true,
      "forbidden_claims_without_api_verification": [
        "verified model execution",
        "signed reviewer pass",
        "API-verified review",
        "approved",
        "no issues found"
      ]
    }
  },
  "access_tiers": {
    "A1": {
      "name": "route-only",
      "allowed_tools": [
        "classify",
        "route",
        "emit-router-packet"
      ],
      "forbidden_tools": [
        "edit-files",
        "run-tests",
        "mutating-shell",
        "git-mutation",
        "deploy"
      ]
    },
    "A2": {
      "name": "read-only-local",
      "allowed_tools": [
        "read-files",
        "search-files",
        "inspect-diffs",
        "inspect-status"
      ],
