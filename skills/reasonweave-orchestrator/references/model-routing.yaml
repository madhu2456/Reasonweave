      ],
      "forbidden_tools": [
        "unowned-edits",
        "destructive-commands",
        "git-push",
        "git-reset"
      ]
    },
    "A5": {
      "name": "verification",
      "allowed_tools": [
        "edit-owned-files",
        "run-tests",
        "run-builds",
        "browser-checks"
      ],
      "forbidden_tools": [
        "deploy",
        "secrets",
        "destructive-commands"
      ]
    },
    "A6": {
      "name": "authorized-sensitive-ops-release",
      "allowed_tools": [
