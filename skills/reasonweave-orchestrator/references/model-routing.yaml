        "approved-ops",
        "approved-release",
        "approved-git-mutation"
      ],
      "forbidden_tools": [
        "unapproved-production",
        "unapproved-destructive"
      ]
    },
    "A7": {
      "name": "blocked-destructive",
      "allowed_tools": [],
      "forbidden_tools": [
        "all-action-before-approval"
      ]
    }
  },
